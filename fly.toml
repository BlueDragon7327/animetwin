# fly.toml app configuration file generated for animetwin on 2026-06-11T08:34:50Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'animetwin'
primary_region = 'iad'
kill_signal = 'SIGINT'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
