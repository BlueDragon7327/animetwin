        <div class="section-header">
            <h2 class="section-title">Browse by Genre</h2>
        </div>
        <div class="genre-tags" id="genreTags">
            <span class="genre-tag" data-genre="action">Action</span>
            <span class="genre-tag" data-genre="romance">Romance</span>
            <span class="genre-tag" data-genre="comedy">Comedy</span>

            <span class="genre-tag" data-genre="shounen">Shounen</span>

        <h3 class="section-title" id="genreResultTitle" style="margin-bottom:16px;">Top Rated</h3>
